description: |
  STM32MP13 Ethernet

  This binding describes the device tree properties required to configure
  and use the Ethernet controllers on the STM32MP13 series (e.g. STM32MP135).

  The STM32MP13 integrates two independent Synopsys DWC EthernetQoS MACs:
    - ETH1 at 0x5800_A000 (SYSCFG ETH1 MII/RMII/RGMII selector)
    - ETH2 at 0x5800_E000 (SYSCFG ETH2 MII/RMII/RGMII selector)

  Both MACs support MII, RMII, and RGMII interface modes; the selected mode
  must be specified via the phy-connection-type property.

  On the STM32MP135F-DK board:
    - ETH1 is connected to a Microchip LAN8742 PHY (RMII)
    - ETH2 is connected to a Microchip KSZ9131RNX PHY (RGMII, 1 Gbps)

compatible: "st,stm32mp13-ethernet"

include:
  - "st,stm32-ethernet-common.yaml"
  - "memory-region.yaml"

properties:
  memory-regions:
    required: true
    description: |
      Memory region in which the Ethernet DMA lists and data buffers will be
      placed. The memory region has to be non-cacheable and accessible by the
      Ethernet peripheral.
  st,ext-phyclk:
    type: boolean
    description:
      Set this property in RMII mode when you have PHY without crystal 50MHz and want to
      select RCC clock instead of ETH_REF_CLK, or in RGMII mode when you want to select
      RCC clock instead of ETH_CLK125.
